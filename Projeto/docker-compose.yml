version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: transferegov-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: transferegov
    ports:
      - "5432:5432"
    volumes:
      - transferegov-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transferegov-backend
    restart: on-failure
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    working_dir: /app
    command: sh -c "npm run migrate && npm run etl && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transferegov-frontend
    restart: on-failure
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  transferegov-db-data: